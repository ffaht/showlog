<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>show log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0b;
      --surface: #131310;
      --surface2: #181814;
      --text: #dedad0;
      --muted: #6e6b65;
      --divider: #1e1e1a;
      --amber-bg: #271c08;
      --amber-text: #c08030;
      --amber-border: #302010;
      --blue-bg: #09101c;
      --blue-text: #5282a8;
      --blue-border: #0d1a2c;
      --hl-bg: #22180a;
      --hl-text: #d4943c;
      --hl-border: #3a2510;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      min-height: 100vh;
      padding: 4rem 2rem 4rem;
      max-width: 920px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 1.75rem;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
    }
    h1 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0;
      cursor: pointer;
      display: inline-block;
      transition: color 0.12s;
    }
    h1:hover { color: var(--amber-text); }
    .header-link {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.12s;
    }
    .header-link:hover { color: var(--text); }
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--divider);
      color: var(--text);
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.5rem 0.75rem 0.5rem 2rem;
      border-radius: 3px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--muted); }
    #search::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
      line-height: 1;
    }
    .toggle-group {
      display: flex;
      border: 1px solid var(--divider);
      border-radius: 3px;
      overflow: hidden;
    }
    .toggle-btn {
      background: transparent;
      border: none;
      border-right: 1px solid var(--divider);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .toggle-btn:last-child { border-right: none; }
    .toggle-btn:hover { background: var(--surface); color: var(--text); }
    .toggle-btn.active { background: var(--surface2); color: var(--text); }
    .toggle-btn.active-attended { color: var(--amber-text); background: var(--amber-bg); }
    .toggle-btn.active-listened { color: var(--blue-text); background: var(--blue-bg); }

    /* active artist filter pill */
    #artist-bar {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-top: -0.4rem;
      margin-bottom: 1rem;
    }
    #artist-bar.visible { display: flex; }
    .artist-pill {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--amber-text);
      background: var(--amber-bg);
      border: 1px solid var(--amber-border);
      border-radius: 3px;
      padding: 2px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .artist-pill button {
      background: none;
      border: none;
      color: var(--amber-text);
      cursor: pointer;
      font-size: 0.8rem;
      line-height: 1;
      padding: 0;
      opacity: 0.7;
      font-family: inherit;
    }
    .artist-pill button:hover { opacity: 1; }
    .artist-bar-label {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .col-headers {
      display: grid;
      grid-template-columns: 110px 1fr 1fr 90px 18px;
      gap: 0 1.5rem;
      padding: 0 0.6rem 0.6rem;
      border-bottom: 1px solid var(--divider);
    }
    .col-headers button {
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.1s;
    }
    .col-headers button:hover { color: var(--text); }
    .col-headers button.sorted { color: var(--text); }
    .sort-ind { font-size: 0.6rem; }
    #show-list { margin-top: 0.15rem; }
    .show-item { border-bottom: 1px solid var(--divider); }
    .show-row {
      display: grid;
      grid-template-columns: 110px 1fr 1fr 90px 18px;
      gap: 0 1.5rem;
      padding: 0.8rem 0.6rem;
      align-items: baseline;
      cursor: pointer;
      transition: background 0.1s ease;
      user-select: none;
    }
    .show-row:hover { background: var(--surface); }
    .show-item.open .show-row { background: var(--surface); }
    .date {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 300;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .artist {
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 400;
    }
    .artist-name {
      cursor: pointer;
      transition: color 0.12s;
      text-decoration-line: underline;
      text-decoration-style: dotted;
      text-decoration-color: transparent;
      text-underline-offset: 3px;
    }
    .artist-name:hover {
      color: var(--amber-text);
      text-decoration-color: var(--amber-border);
    }
    .artist-name.active { color: var(--amber-text); }
    .heart {
      font-size: 1.1rem;
      color: #c55a7a;
      line-height: 1;
    }
    .expand-venue {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 1.1rem;
      letter-spacing: 0.02em;
    }
    .venue { font-size: 0.75rem; color: var(--muted); font-weight: 300; }
    .tag {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
      display: inline-block;
    }
    .tag-attended { background: var(--amber-bg); color: var(--amber-text); border: 1px solid var(--amber-border); }
    .tag-listened { background: var(--blue-bg); color: var(--blue-text); border: 1px solid var(--blue-border); }
    .chevron {
      font-size: 0.65rem;
      color: var(--muted);
      transition: transform 0.22s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .show-item.open .chevron { transform: rotate(180deg); }
    .expand-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s ease;
      background: var(--surface);
    }
    .show-item.open .expand-panel { max-height: 1500px; }
    .expand-inner {
      padding: 1.25rem 0.6rem 1.4rem;
      border-top: 1px solid var(--divider);
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 0 1.5rem;
    }
    .setlist-block .set-section:last-child { margin-bottom: 0; }
    .set-section { margin-bottom: 0.9rem; }
    .set-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 0.3rem;
    }
    .set-songs {
      font-size: 0.78rem;
      color: var(--text);
      font-weight: 400;
      line-height: 1.85;
    }
    /* song formatting */
    .set-songs em { font-style: italic; font-weight: 600; }   /* ** = bold-italic */
    .set-songs strong { font-style: normal; font-weight: 500; color: var(--text); }  /* * = bold */
    .set-songs i { font-style: italic; font-weight: 400; }     /* _ = italic only */
    .set-songs .hl {
      color: var(--hl-text);
      font-style: normal;
    }
    .set-songs .hl em,
    .set-songs .hl strong,
    .set-songs .hl i { font-style: normal; }

    .notes-block {
      border-left: 1px solid var(--divider);
      padding-left: 1.25rem;
    }
    .notes-block.empty { border-left: none; padding-left: 0; }
    /* shared small caps label */
    .notes-label, .review-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 0.4rem;
    }
    /* notes: under the setlist, italic by default */
    .notes-inline {
      margin-top: 1.25rem;
      padding-top: 1.1rem;
      border-top: 1px solid var(--divider);
    }
    .notes-text {
      font-size: 0.84rem;
      color: var(--text);
      font-weight: 400;
      line-height: 1.7;
      font-style: italic;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
    }
    /* review: sidebar, upright */
    .review-inline { margin-bottom: 1rem; }
    .review-text {
      font-size: 0.84rem;
      color: var(--text);
      font-weight: 400;
      line-height: 1.7;
      font-style: normal;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
    }
    /* emphasis inside notes + review (markers always win over the default) */
    .notes-text em, .review-text em { font-style: italic; font-weight: 600; }
    .notes-text strong, .review-text strong { font-style: normal; font-weight: 500; }
    .notes-text i, .review-text i { font-style: italic; font-weight: 400; }
    .notes-text .hl, .review-text .hl { color: var(--hl-text); font-style: normal; }
    .notes-text .hl em, .notes-text .hl strong, .notes-text .hl i,
    .review-text .hl em, .review-text .hl strong, .review-text .hl i { font-style: normal; }
    .source-inline {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 1rem;
      font-style: normal;
      font-family: 'IBM Plex Mono', monospace;
      line-height: 1.6;
    }
    .rating-block {
      margin-top: 1rem;
    }
    .listened-block {
      margin-top: 0.7rem;
    }
    .listened-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 0.25rem;
    }
    .listened-dates {
      font-size: 0.72rem;
      color: var(--text);
      font-weight: 300;
      font-family: 'IBM Plex Mono', monospace;
    }
    .listened-dates .ld-sep { color: var(--muted); }
    .listened-dates .ld-date {
      cursor: pointer;
      transition: color 0.12s;
      text-decoration-line: underline;
      text-decoration-style: dotted;
      text-decoration-color: transparent;
      text-underline-offset: 3px;
    }
    .listened-dates .ld-date:hover {
      color: var(--amber-text);
      text-decoration-color: var(--amber-border);
    }
    .listened-dates .ld-date.active {
      color: var(--amber-text);
      text-decoration-color: var(--amber-border);
    }
    .rating-value {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.01em;
    }
    .rating-value .denom {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
    }
    .no-results {
      padding: 2rem 0.6rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    footer {
      margin-top: 3rem;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      line-height: 2;
    }
    @media (max-width: 620px) {
      body { padding: 3rem 1.25rem 3rem; }
      .col-headers, .show-row { grid-template-columns: 90px 1fr 80px 18px; }
      .col-headers .venue-hdr, .show-row .venue { display: none; }
      .expand-inner { grid-template-columns: 1fr; }
      .notes-block { border-left: none; padding-left: 0; border-top: 1px solid var(--divider); padding-top: 1rem; margin-top: 0.75rem; }
    }
  </style>
</head>

    <button data-col="type">type <span class="sort-ind"></span></button>

  </div>

    /* SHOWS_END */

    let sortCol = 'date', sortDir = 'desc', filterType = 'all', searchQuery = '', openIdx = null, artistFilter = null;
    let selectedListen = {};  // origIdx → listened array index

    function selectListen(origIdx, li, e) {
      e.stopPropagation();
      selectedListen[origIdx] = selectedListen[origIdx] === li ? undefined : li;
      render();
    }

    function getDisplayData() {
      let r = shows.map((s, i) => ({...s, origIdx: i}));
      if (filterType !== 'all') r = r.filter(s => s.type === filterType);
      if (artistFilter) r = r.filter(s => s.artist === artistFilter);
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        r = r.filter(s => s.artist.toLowerCase().includes(q) || s.venue.toLowerCase().includes(q) || s.city.toLowerCase().includes(q));
      }
      r.sort((a, b) => {
        let av = sortCol === 'venue' ? a.venue + a.city : a[sortCol];
        let bv = sortCol === 'venue' ? b.venue + b.city : b[sortCol];
        const cmp = av < bv ? -1 : av > bv ? 1 : 0;
        return sortDir === 'asc' ? cmp : -cmp;
      });
      return r;
    }

    function fmtDate(d) {
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(d || '');
      return m ? `${m[2]}-${m[3]}-${m[1]}` : d;
    }

    function fmtDateFull(d) {
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(d || '');
      if (!m) return d;
      const dt = new Date(+m[1], +m[2]-1, +m[3]);
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return `${days[dt.getDay()]}, ${months[dt.getMonth()]} ${+m[3]} ${m[1]}`;
    }

    function fmtRating(r) {
      const n = Number(r);
      return n === 10 ? '10' : n.toFixed(1);
    }

    function fmt(str) {
      // escape HTML first so > and -> render literally, exactly as typed,
      // in the same font and color as the rest of the setlist text
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        // then apply song-emphasis markup (** before * matters)
        .replace(/\*\*(.*?)\*\*/g, '<em>$1</em>')
        .replace(/\*(.*?)\*/g, '<strong>$1</strong>')
        .replace(/_(.*?)_/g, '<i>$1</i>')
        .replace(/==(.*?)==/g, '<span class="hl">$1</span>');
    }

    function filterArtist(name, e) {
      e.stopPropagation();
      if (artistFilter === name) {
        artistFilter = null;
      } else {
        artistFilter = name;
      }
      updateArtistBar();
      render();
    }

    function clearArtistFilter() {
      artistFilter = null;
      updateArtistBar();
      render();
    }

    function updateArtistBar() {
      const bar = document.getElementById('artist-bar');
      const pill = document.getElementById('artist-pill-name');
      if (artistFilter) {
        bar.classList.add('visible');
        pill.textContent = artistFilter;
      } else {
        bar.classList.remove('visible');
      }
    }

    function render() {
      const list = document.getElementById('show-list');
      const data = getDisplayData();
      if (!data.length) { list.innerHTML = '<div class="no-results">no shows match.</div>'; return; }
      list.innerHTML = data.map(s => {
        const isOpen = openIdx === s.origIdx;
        const setsHtml = s.sets.map(set =>
          `<div class="set-section"><span class="set-label">${set.label}</span><span class="set-songs">${fmt(set.songs)}</span></div>`
        ).join('');
        const ratingHtml = (s.rating !== undefined && s.rating !== null && s.rating !== '')
          ? `<div class="rating-block"><span class="rating-value">${fmtRating(s.rating)}</span></div>`
          : '';
        const ld = Array.isArray(s.listened) ? s.listened.filter(l => l && (typeof l === 'string' ? l : l.date)) : [];
        const ldNorm = ld.map(l => typeof l === 'string' ? {date:l} : l);

        const notesHtml = s.notes
          ? `<div class="notes-inline"><span class="notes-label">notes</span><span class="notes-text">${fmt(s.notes)}</span></div>`
          : '';

        // source moves under setlist
        const srcHtml = s.source ? `<div class="source-inline">${s.source.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>` : '';

        // active listened date for this show
        const selLd = selectedListen[s.origIdx];
        const ldReview = selLd !== undefined && ldNorm[selLd] && ldNorm[selLd].review;
        const activeReview = ldReview ? ldNorm[selLd].review : (s.review || '');
        const reviewHtml = activeReview
          ? `<div class="review-inline" id="review-${s.origIdx}"><span class="review-label">review${ldReview ? ' · '+ldNorm[selLd].date : ''}</span><span class="review-text">${fmt(activeReview)}</span></div>`
          : '';

        const listenedHtml = ldNorm.length
          ? `<div class="listened-block"><span class="listened-label">date listened</span><span class="listened-dates">${ldNorm.map((l,li)=>{
              const cls = selLd === li ? 'ld-date active' : 'ld-date';
              return `<span class="${cls}" onclick="selectListen(${s.origIdx},${li},event)">${l.date}</span>`;
            }).join('<span class="ld-sep"> · </span>')}</span></div>`
          : '';

        const venueHeader = `<div class="expand-venue">${s.artist}<br>${fmtDateFull(s.date)}${s.venue ? '<br>'+s.venue : ''}${s.city ? '<br>'+s.city : ''}</div>`;
        return `<div class="show-item${isOpen?' open':''}" data-orig="${s.origIdx}">
          <div class="show-row" onclick="toggle(${s.origIdx})">
            <span class="date">${fmtDate(s.date)}${s.fav ? '<span class="heart">♥</span>' : ''}</span>
            <span class="artist"><span class="artist-name${artistFilter === s.artist ? ' active' : ''}" onclick="filterArtist('${s.artist.replace(/'/g,"\\'")}', event)">${s.artist}</span></span>
            <span class="venue">${s.venue}<br>${s.city}</span>
            <span class="tag tag-${s.type}">${s.type}</span>
            <span class="chevron">▾</span>
          </div>
          <div class="expand-panel">
            <div class="expand-inner">
              <div class="setlist-block">
                ${venueHeader}
                ${setsHtml}
                ${notesHtml}
                ${srcHtml}
              </div>
              <div class="notes-block${(reviewHtml||ratingHtml||listenedHtml)?'':' empty'}">
                ${reviewHtml}
                ${ratingHtml}
                ${listenedHtml}
              </div>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function toggle(i) { openIdx = openIdx === i ? null : i; render(); }

    function updateSortHeaders() {
      document.querySelectorAll('.col-headers button').forEach(btn => {
        const col = btn.dataset.col;
        const ind = btn.querySelector('.sort-ind');
        if (col === sortCol) { btn.classList.add('sorted'); ind.textContent = sortDir === 'asc' ? '↑' : '↓'; }
        else { btn.classList.remove('sorted'); ind.textContent = ''; }
      });
    }

    document.querySelectorAll('.col-headers button').forEach(btn => {
      btn.addEventListener('click', () => {
        const col = btn.dataset.col;
        if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = col; sortDir = col === 'date' ? 'desc' : 'asc'; }
        updateSortHeaders(); render();
      });
    });

    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filterType = btn.dataset.filter;
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active','active-attended','active-listened'));
        if (filterType === 'all') btn.classList.add('active');
        else if (filterType === 'attended') btn.classList.add('active-attended');
        else btn.classList.add('active-listened');
        render();
      });
    });

    document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; render(); });

    function resetAll() {
      sortCol = 'date'; sortDir = 'desc';
      filterType = 'all';
      searchQuery = '';
      artistFilter = null;
      openIdx = null;
      document.getElementById('search').value = '';
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active','active-attended','active-listened'));
      document.querySelector('.toggle-btn[data-filter="all"]').classList.add('active');
      updateSortHeaders();
      updateArtistBar();
      render();
    }
    document.getElementById('reset-title').addEventListener('click', resetAll);

    render();
  </script>
